category: layer
command: create-file
help: Create a file layer
args:
- name: name
  type: str
  required: true
  help: Layer name
- name: --file-path
  type: str
  required: true
  help: Path to image file
- name: --position
  type: str
  default: above_current
  choices:
  - above_current
  - below_current
  - above_named
  - below_named
  - top
  - bottom
  help: Where to place the layer
- name: --reference
  type: str
  help: Reference layer name
action: create_file_layer
