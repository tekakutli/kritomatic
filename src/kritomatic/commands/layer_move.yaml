category: layer
command: move
help: Move layer to group
args:
- name: layer_name
  type: str
  required: true
  help: Layer to move
- name: group_name
  type: str
  required: true
  help: Destination group
- name: --position
  type: str
  default: inside
  choices:
  - inside
  - above
  - below
  help: Position relative to group
action: move_layer_to_group
