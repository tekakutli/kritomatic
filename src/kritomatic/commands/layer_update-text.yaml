category: layer
command: update-text
help: Update existing text on a vector layer
args:
- name: layer_name
  type: str
  required: true
  help: Name of the target vector layer
- name: --old-text
  type: str
  required: true
  help: Current text to replace
- name: --new-text
  type: str
  required: true
  help: New text content
action: update_vector_text
