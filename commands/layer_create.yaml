category: layer
command: create
help: Create a new layer
args:
- name: name
  type: str
  required: true
  help: Layer name
- name: --layer-type
  type: str
  default: paintlayer
  choices:
  - paintlayer
  - grouplayer
  - selectionmask
  - vectorlayer
  - filterlayer
  help: Layer type
- name: --position
  type: str
  default: above_current
  choices:
  - above_current
  - below_current
  - above_named
  - below_named
  - top
  - bottom
  help: Where to place the layer
- name: --reference
  type: str
  help: Reference layer name
action: create_layer
