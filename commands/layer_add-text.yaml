category: layer
command: add-text
help: Add vector text to a vector layer
args:
- name: layer_name
  type: str
  required: true
  help: Name of the target vector layer
- name: --text
  type: str
  required: true
  help: Text content
- name: --font-family
  type: str
  default: sans-serif
  help: Font family (e.g., Arial, sans-serif)
- name: --font-size
  type: int
  default: 12
  help: Font size in points
- name: --x
  type: float
  default: 0
  help: X position in pixels
- name: --y
  type: float
  default: 0
  help: Y position in pixels
- name: --color
  type: str
  default: '#000000'
  help: Hex color (e.g.,
- name: --alignment
  type: str
  default: left
  choices:
  - left
  - center
  - right
  help: Text alignment
action: add_vector_text
