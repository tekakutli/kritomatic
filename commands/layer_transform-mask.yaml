category: layer
command: transform-mask
help: Apply transformation to a transform mask
args:
- name: mask_name
  type: str
  required: true
  help: Name of the transform mask
- name: --translate-x
  type: float
  default: 0
  help: X translation in pixels
- name: --translate-y
  type: float
  default: 0
  help: Y translation in pixels
- name: --rotation
  type: float
  default: 0
  help: Rotation in degrees
- name: --scale-x
  type: float
  default: 1.0
  help: X scale factor
- name: --scale-y
  type: float
  default: 1.0
  help: Y scale factor
action: transform_mask
