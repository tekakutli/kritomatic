category: doc
command: new
help: Create a new document with custom dimensions
args:
- name: --name
  type: str
  default: New Document
  help: Name for the new document
- name: --width
  type: int
  default: 1920
  help: Width in pixels
- name: --height
  type: int
  default: 1080
  help: Height in pixels
- name: --resolution
  type: float
  default: 300
  help: Resolution in DPI
action: create_new_with_dimensions
