category: layer
command: color-to-alpha
help: Add a non-destructive Color to Alpha filter mask
args:
- name: layer_name
  type: str
  required: true
  help: Name of the target layer
- name: --color
  type: str
  default: '#ffffff'
  help: Hex color to make transparent
- name: --threshold
  type: int
  default: 255
  help: Threshold for color matching
action: add_color_to_alpha_mask
