category: layer
command: create-blend
help: Create a new layer with blend mode above current layer
args:
- name: name
  type: str
  required: true
  help: Layer name
- name: blend_mode
  type: str
  required: true
  choices:
  - normal
  - multiply
  - screen
  - overlay
  - add
  - difference
  - color
  - saturation
  - hue
  - luminosity
  help: Blending mode for the layer
action: create_blend_layer
